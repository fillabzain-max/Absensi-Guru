<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Guru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i data-lucide="graduation-cap"></i>
                <span class="font-bold text-xl tracking-tight">PresensiGuru</span>
            </div>
            <div id="current-time" class="text-sm font-medium opacity-90"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <!-- Status Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center">
                <p class="text-gray-500 text-xs uppercase font-semibold">Total Guru</p>
                <p class="text-2xl font-bold text-indigo-600" id="stat-total">0</p>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center border-l-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-semibold">Hadir</p>
                <p class="text-2xl font-bold text-green-600" id="stat-hadir">0</p>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center border-l-4 border-yellow-500">
                <p class="text-gray-500 text-xs uppercase font-semibold">Izin/Sakit</p>
                <p class="text-2xl font-bold text-yellow-600" id="stat-izin">0</p>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center border-l-4 border-red-500">
                <p class="text-gray-500 text-xs uppercase font-semibold">Alpa</p>
                <p class="text-2xl font-bold text-red-600" id="stat-alpa">0</p>
            </div>
        </div>

        <!-- Form Section -->
        <section class="glass-card rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex items-center justify-between">
                <h2 class="text-lg font-bold text-indigo-800 flex items-center">
                    <i data-lucide="clipboard-check" class="mr-2 w-5 h-5"></i> Form Input Absensi
                </h2>
                <span class="text-xs text-indigo-500 font-medium italic">*Wajib menyalakan GPS</span>
            </div>
            
            <form id="absensiForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- KOLOM NAMA SEKARANG MENGGUNAKAN SELECT DROPDOWN -->
                    <div class="space-y-1">
                        <label class="block text-sm font-semibold text-gray-700">Nama Lengkap Guru</label>
                        <select id="nama" name="nama" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white">
                            <option value="">Pilih Nama Anda...</option>
                            <!-- SILAKAN EDIT/TAMBAH DAFTAR NAMA GURU DI BAWAH INI -->
                            <option value="Lutfillah, S.Pd.I">Lutfillah, S.Pd.I</option>
                            <option value="M. Rosyidi, S.Pd.I">M. Rosyidi, S.Pd.I</option>
                            <option value="Drs. H. Hasan Bisri, M.Pd">Drs. H. Hasan Bisri, M.Pd</option>
                            <option value="KH. Saiful Hadi, MA.">KH. Saiful Hadi, MA.</option>
                            <option value="Maliki, SH">Maliki, SH</option>
							<option value="Najid, S.Pd">Najid, S.Pd</option>
							<option value="Moh. Fathoni Rufii, S.Pd">Moh. Fathoni Rufii, S.Pd</option>
							<option value="Nur Hasan, S.Th.I">Nur Hasan, S.Th.I</option>
							<option value="Abd. Wahab, S.Pd">Abd. Wahab, S.Pd</option>
							<option value="Kasyifatul Ilmiyah, S.Pd">Kasyifatul Ilmiyah, S.Pd</option>
							<option value="Moh. Mujab, S.Pd">Moh. Mujab, S.Pd</option>
							<option value="Bagus Maulana Hamsah, S.Psi">Bagus Maulana Hamsah, S.Psi</option>
							<option value="Zakiyyatul Miskiyah, S.Kom">Zakiyyatul Miskiyah, S.Kom</option>
							<option value="Bunga Kharisma, SH">Bunga Kharisma, SH</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-sm font-semibold text-gray-700">Mata Pelajaran</label>
                        <select id="mapel" name="mapel" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white">
                            <option value="">Pilih Mapel...</option>
                            <option value="Al-Qur'an Hadis">Al-Qur'an Hadis</option>
							<option value="Aqidah Akhlak">Aqidah Akhlak</option>
							<option value="Fiqih">Fiqih</option>
							<option value="SKI">SKI</option>
							<option value="Bahasa Arab">Bahasa Arab</option>
							<option value="Ke-NU-an">Ke-NU-an</option>
							<option value="PPKn">PPKn</option>
							<option value="Matematika">Matematika</option>
                            <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                            <option value="Bahasa Inggris">Bahasa Inggris</option>
                            <option value="IPA">IPA</option>
                            <option value="IPS">IPS</option>
                            <option value="PJOK">PJOK</option>
                            <option value="Seni Budaya">Seni Budaya</option>
							<option value="Informatika">Informatika</option>
							<option value="Bahasa Jawa">Bahasa Jawa</option>
							<option value="Nahwu">Nahwu</option>
							<option value="Shorof">Shorof</option>
							<option value="Ta'lim">Ta'lim</option>
							<option value="Taqib">Taqrib</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">Status Kehadiran</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Hadir" checked class="hidden peer">
                            <div class="text-center py-2 rounded-xl border-2 border-gray-100 peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                                <span class="text-sm font-medium">Hadir</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Izin/Sakit" class="hidden peer">
                            <div class="text-center py-2 rounded-xl border-2 border-gray-100 peer-checked:border-yellow-500 peer-checked:bg-yellow-50 hover:bg-gray-50 transition">
                                <span class="text-sm font-medium">Izin</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="Alpa" class="hidden peer">
                            <div class="text-center py-2 rounded-xl border-2 border-gray-100 peer-checked:border-red-500 peer-checked:bg-red-50 hover:bg-gray-50 transition">
                                <span class="text-sm font-medium">Alpa</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">Keterangan (Opsional)</label>
                    <textarea id="keterangan" name="keterangan" rows="2" placeholder="Contoh: Mengajar di Kelas 9A"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"></textarea>
                </div>

                <div id="location-status" class="text-xs text-gray-500 flex items-center">
                    <i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> Mendeteksi lokasi...
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center space-x-2">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Kirim Absensi</span>
                </button>
            </form>
        </section>

        <!-- History Table -->
        <section class="glass-card rounded-3xl shadow-lg overflow-hidden mb-10">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Riwayat Hari Ini</h3>
                <button id="refreshBtn" class="p-2 hover:bg-gray-100 rounded-full transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-gray-400"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold">
                        <tr>
                            <th class="px-6 py-3">Waktu</th>
                            <th class="px-6 py-3">Nama</th>
                            <th class="px-6 py-3">Mapel</th>
                            <th class="px-6 py-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-gray-100">
                        <!-- Data loaded here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center space-y-4">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="check-circle-2" class="w-12 h-12"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800">Berhasil!</h3>
            <p class="text-gray-600">Data absensi Anda telah berhasil dikirim ke sistem.</p>
            <button onclick="closeModal()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Oke, Mengerti</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFvxJEbfhCy0DkXwSE0AAXHtKSyKSGOywoFOcTzt-Lbt4AQD1rVooFMzGO--rL62Cx/exec";

        let userLocation = "Lokasi tidak diizinkan";
        let attendanceData = [];

        function safeCreateIcons() {
            try { if (typeof lucide !== 'undefined') lucide.createIcons(); } catch (e) {}
        }

        window.onload = function() {
            safeCreateIcons();
            updateTime();
            renderHistory();
            getLocation();
        };

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const timeEl = document.getElementById('current-time');
            if (timeEl) timeEl.textContent = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateTime, 1000);

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        userLocation = `${p.coords.latitude}, ${p.coords.longitude}`;
                        document.getElementById('location-status').innerHTML = `<i data-lucide="check" class="w-3 h-3 mr-1 text-green-500"></i> Lokasi terdeteksi`;
                        safeCreateIcons();
                    },
                    () => {
                        document.getElementById('location-status').innerHTML = `<i data-lucide="x-circle" class="w-3 h-3 mr-1 text-red-500"></i> Lokasi ditolak`;
                        safeCreateIcons();
                    }
                );
            }
        }

        const form = document.getElementById('absensiForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></span> Mengirim...`;

            const formData = new FormData(form);
            const data = {
                timestamp: new Date().toLocaleString('id-ID'),
                nama: formData.get('nama'),
                mapel: formData.get('mapel'),
                status: formData.get('status'),
                keterangan: formData.get('keterangan'),
                lokasi: userLocation
            };

            if (SCRIPT_URL !== "ISI_URL_WEB_APP_ANDA_DISINI") {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (err) {
                    console.error("Gagal mengirim:", err);
                }
            }

            attendanceData.unshift(data);
            updateStats();
            renderHistory();
            
            setTimeout(() => {
                form.reset();
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
                document.getElementById('successModal').classList.remove('hidden');
                document.getElementById('successModal').classList.add('flex');
            }, 800);
        });

        function updateStats() {
            document.getElementById('stat-total').textContent = attendanceData.length;
            document.getElementById('stat-hadir').textContent = attendanceData.filter(d => d.status === 'Hadir').length;
            document.getElementById('stat-izin').textContent = attendanceData.filter(d => d.status === 'Izin/Sakit').length;
            document.getElementById('stat-alpa').textContent = attendanceData.filter(d => d.status === 'Alpa').length;
        }

        function renderHistory() {
            const body = document.getElementById('historyBody');
            body.innerHTML = '';
            attendanceData.forEach(item => {
                const color = item.status === 'Hadir' ? 'text-green-600 bg-green-50' : 
                             item.status === 'Alpa' ? 'text-red-600 bg-red-50' : 'text-yellow-600 bg-yellow-50';
                body.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-mono text-xs text-gray-400">${item.timestamp.split(', ')[1] || item.timestamp}</td>
                        <td class="px-6 py-4 font-medium text-gray-800">${item.nama}</td>
                        <td class="px-6 py-4 text-gray-500">${item.mapel}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${color}">${item.status}</span></td>
                    </tr>`;
            });
            if (attendanceData.length === 0) body.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400 italic">Belum ada data.</td></tr>`;
        }

        window.closeModal = () => {
            document.getElementById('successModal').classList.add('hidden');
            document.getElementById('successModal').classList.remove('flex');
        };
    </script>
</body>
</html>
